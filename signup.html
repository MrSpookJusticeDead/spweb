<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Spook</title>
    <link rel="icon" type="image/png" href="imgs/icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/config.js"></script>
</head>

<body>

    <button id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="icon">🌙</span>
    </button>

    <div class="container" style="max-width:440px; padding-top:80px; padding-bottom:80px;">

        <header style="margin-bottom:40px; padding-bottom:20px; border-bottom:2px solid var(--border);">
            <a href="/index.html"
                style="color:var(--text-muted); text-decoration:none; font-size:0.85rem; font-weight:bold; text-transform:uppercase; letter-spacing:1px;">←
                Back to Home</a>
            <h1 style="margin-top:20px; font-size:2rem; letter-spacing:-1px;">Create Account</h1>
            <p style="color:var(--text-muted); font-size:0.9rem; margin-top:6px;">Join to publish your own charts.</p>
        </header>

        <div style="display:flex; flex-direction:column; gap:16px;">

            <div>
                <label for="username"
                    style="display:block; font-size:0.8rem; font-weight:bold; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; color:var(--text-muted);">Username
                    *</label>
                <input id="username" type="text" placeholder="e.g. spook" maxlength="30"
                    style="width:100%; padding:12px; background:var(--card-bg); border:2px solid var(--border); color:var(--text); font-family:inherit; font-size:1rem; outline:none; transition:border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
                <p style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">Letters, numbers, underscores
                    only. This is what others will see.</p>
            </div>

            <div>
                <label for="email"
                    style="display:block; font-size:0.8rem; font-weight:bold; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; color:var(--text-muted);">Email</label>
                <input id="email" type="email" placeholder="you@example.com"
                    style="width:100%; padding:12px; background:var(--card-bg); border:2px solid var(--border); color:var(--text); font-family:inherit; font-size:1rem; outline:none; transition:border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
            </div>

            <div>
                <label for="password"
                    style="display:block; font-size:0.8rem; font-weight:bold; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; color:var(--text-muted);">Password</label>
                <input id="password" type="password" placeholder="••••••••"
                    style="width:100%; padding:12px; background:var(--card-bg); border:2px solid var(--border); color:var(--text); font-family:inherit; font-size:1rem; outline:none; transition:border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"
                    onkeydown="if(event.key==='Enter') document.getElementById('btn-signup').click()">
            </div>

            <button id="btn-signup"
                style="padding:14px; background:var(--border); color:var(--bg); font-family:inherit; font-size:1rem; font-weight:bold; text-transform:uppercase; letter-spacing:1px; border:2px solid var(--border); cursor:pointer; transition:transform 0.15s, box-shadow 0.15s; box-shadow:3px 3px 0 var(--accent);"
                onmouseover="this.style.transform='translate(-2px,-2px)'; this.style.boxShadow='5px 5px 0 var(--accent)'"
                onmouseout="this.style.transform='translate(0,0)'; this.style.boxShadow='3px 3px 0 var(--accent)'"
                onmousedown="this.style.transform='translate(1px,1px)'; this.style.boxShadow='none'"
                onmouseup="this.style.transform='translate(-2px,-2px)'; this.style.boxShadow='5px 5px 0 var(--accent)'">
                Sign Up
            </button>

            <p id="msg" style="color:var(--accent); font-size:0.85rem; min-height:1.2em;"></p>

            <div
                style="border-top:1px solid var(--border); padding-top:16px; display:flex; flex-direction:column; gap:8px;">
                <p style="color:var(--text-muted); font-size:0.85rem;">
                    Already have an account? <a href="/login.html" style="color:var(--accent); font-weight:bold;">Log in
                        →</a>
                </p>
                <p style="color:var(--text-muted); font-size:0.85rem;">
                    Just browsing? <a href="/charts.html"
                        style="color:var(--text); font-weight:bold; text-decoration:underline;">View charts →</a>
                </p>
            </div>

        </div>
    </div>

    <script src="scripts/theme.js"></script>
    <script src="scripts/auth-nav.js"></script>
    <script>
        const { createClient } = supabase
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY)
        const msg = document.getElementById('msg')

        const DUPE_PHRASES = ['user already registered', 'already been registered', 'already exists', 'email address is already', 'already in use']
        function isDuplicateError(m) { return DUPE_PHRASES.some(p => (m ?? '').toLowerCase().includes(p)) }

        document.getElementById('btn-signup').onclick = async () => {
            const btn = document.getElementById('btn-signup')
            const username = document.getElementById('username').value.trim()
            const email = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value

            // Validation
            if (!username) { msg.textContent = '✗ Please choose a username.'; return }
            if (!/^[a-zA-Z0-9_]+$/.test(username)) { msg.textContent = '✗ Username can only contain letters, numbers and underscores.'; return }
            if (username.length < 2) { msg.textContent = '✗ Username must be at least 2 characters.'; return }
            if (!email || !password) { msg.textContent = '✗ Please fill in all fields.'; return }
            if (password.length < 6) { msg.textContent = '✗ Password must be at least 6 characters.'; return }

            // Check username taken
            const { data: existing } = await sb.from('profiles').select('id').eq('username', username).maybeSingle()
            if (existing) { msg.textContent = '✗ That username is already taken.'; return }

            btn.textContent = 'Creating account…'
            btn.disabled = true
            msg.textContent = ''
            msg.style.color = 'var(--accent)'

            const { data, error } = await sb.auth.signUp({
                email,
                password,
                options: { data: { username } }   // ← store username in metadata
            })

            if (error) {
                msg.textContent = isDuplicateError(error.message)
                    ? '✗ An account with this email already exists. Try logging in.'
                    : '✗ ' + error.message
                btn.textContent = 'Sign Up'; btn.disabled = false; return
            }

            if (data?.user && data.user.identities && data.user.identities.length === 0) {
                msg.textContent = '✗ An account with this email already exists. Try logging in.'
                btn.textContent = 'Sign Up'; btn.disabled = false; return
            }

            // Insert profile row with username
            if (data?.user) {
                const { error: profileError } = await sb
                    .from('profiles')
                    .upsert({ id: data.user.id, username }, { onConflict: 'id' })

                if (profileError) {
                    console.error('Profile save error:', profileError)
                    // Don't block signup if profile fails - auth user still exists
                }
            }

            msg.style.color = '#66ff99'
            msg.textContent = '✓ Check your email to confirm your account!'
            btn.textContent = 'Sign Up'
            btn.disabled = false
        }
    </script>
</body>

</html>
