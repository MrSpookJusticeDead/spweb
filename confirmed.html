<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed | Spook</title>
    <link rel="icon" type="image/png" href="imgs/icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/config.js"></script>
</head>
<body>
<div id="content" class="container" style="display:none; max-width:440px; padding-top:80px; text-align:center;">
    <h1 style="font-size:2rem;">✓ Email Confirmed!</h1>
    <p style="color:var(--text-muted); margin-top:12px;">Your account is ready. Redirecting you now…</p>
</div>
<script src="scripts/theme.js"></script>
<script>
    // Only show content if arriving from a confirmation link
    const hash = window.location.hash
    const hasToken = hash.includes('access_token') || hash.includes('token_hash') || hash.includes('type=signup')

    if (!hasToken) {
        // Not from a confirmation link — show nothing, do nothing
        document.title = ''
    } else {
        document.getElementById('content').style.display = 'block'

        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                setTimeout(() => { location.href = '/upload.html' }, 1500)
            }
        })

        // Fallback redirect
        setTimeout(() => { location.href = '/upload.html' }, 3000)
    }
</script>
</body>
</html>
