<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Spook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
            
            /* CENTERING MAGIC */
            display: flex;
            justify-content: center; /* Centers horizontally */
            align-items: center;     /* Centers vertically */
            height: 100vh;           /* Forces body to be full screen height */
            overflow: hidden;        /* Disables the scrollbar */
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 0 20px; /* Added padding so text doesn't touch edges on mobile */
            text-align: center; /* Ensures text inside is centered */
        }

        .divider {
            border: none;
            border-top: 1px solid #ffffff;
            margin: 0 auto 30px auto; /* Centers the line and adds bottom space */
            width: 100%;
            max-width: 600px; /* Limits line width slightly for aesthetics */
        }

        .error-code {
            font-size: 120px;
            margin-bottom: 10px;
            line-height: 1;
        }

        .error-message {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .error-description {
            color: #888;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .home-link {
            display: inline-block;
            color: #ff6b6b;
            text-decoration: none;
            border: 1px solid #ff6b6b;
            padding: 10px 30px;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #ff6b6b;
            color: #0a0a0a;
        }
    </style>

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="container">
        <hr class="divider">
        <section class="error-section">
            <div class="error-code">404</div>
            <div class="error-message">oopsie, page not found</div>
            <div class="error-description">
                i usually do things, but this page doesn't exist<br>
                guess it got spooked away
            </div>
            <a href="/" class="home-link">go back home</a>
        </section>
    </div>
</body>
</html>
