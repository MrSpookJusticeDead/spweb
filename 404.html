<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Spook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .title h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .tags {
            color: #888;
            font-size: 14px;
        }

        .nav {
            margin: 30px 0;
        }

        .nav a {
            color: #ff6b6b;
            text-decoration: none;
            margin-right: 30px;
            font-size: 14px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .divider {
            border: none;
            border-top: 1px solid #ffffff;
            margin: 30px 0;
        }

        .error-section {
            padding: 60px 0;
            text-align: center;
        }

        .error-code {
            font-size: 120px;
            margin-bottom: 20px;
        }

        .error-message {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .error-description {
            color: #888;
            margin-bottom: 40px;
        }

        .home-link {
            display: inline-block;
            color: #ff6b6b;
            text-decoration: none;
            border: 1px solid #ff6b6b;
            padding: 10px 30px;
            margin-top: 20px;
        }

        .home-link:hover {
            background: #ff6b6b;
            color: #0a0a0a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">:)</div>
            <div class="title">
                <h1>Spook</h1>
                <div class="tags">Brainrot / Aura / Skibidi touhou</div>
            </div>
        </div>

        <nav class="nav">
            <a href="/">ABOUT</a>
            <a href="/#social">SOCIAL MEDIA</a>
            <a href="/#contact">CONTACT</a>
        </nav>

        <hr class="divider">

        <section class="error-section">
            <div class="error-code">404</div>
            <div class="error-message">oopsie, page not found</div>
            <div class="error-description">
                i usually do things, but this page doesn't exist<br>
                guess it got spooked away
            </div>
            <a href="index.html" class="home-link">go back home</a>
        </section>
    </div>
</body>
</html>
